name: ML Pipeline CI

on:
  push:
    branches: [main]
    paths:
      - 'signx-takeoff/bid_model.py'
      - 'signx-takeoff/bid_scoring.py'
      - 'signx-takeoff/calibrate.py'
      - 'services/ml/**'
  pull_request:
    branches: [main]
    paths:
      - 'signx-takeoff/bid_model.py'
      - 'signx-takeoff/bid_scoring.py'
      - 'signx-takeoff/calibrate.py'
      - 'services/ml/**'

jobs:
  ml-lint:
    name: ML Code Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint ML code
        run: |
          ruff check signx-takeoff/bid_model.py signx-takeoff/bid_scoring.py signx-takeoff/calibrate.py --output-format=github || true

  ml-import-check:
    name: ML Import Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn pandas numpy duckdb

      - name: Verify bid_scoring imports
        working-directory: signx-takeoff
        run: |
          python -c "from bid_scoring import score_bid, get_win_rate_stats; print('bid_scoring imports OK')"
