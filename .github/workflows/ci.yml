name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  signx-takeoff-tests:
    name: SignX Takeoff Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: signx-takeoff
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout pytest-asyncio
          pip install fastapi uvicorn httpx pydantic python-dotenv python-multipart
          pip install PyMuPDF scikit-learn pandas numpy duckdb

      - name: Smoke test imports
        run: |
          python -c "from abc_engine import estimate, estimate_monument, estimate_pylon; print('abc_engine OK')"
          python -c "from drawing_search import search_drawings, find_customer_folder; print('drawing_search OK')"

      - name: Run estimator tests
        run: |
          python -m pytest tests/test_estimators.py -v --timeout=30 --timeout-method=thread

  signcalc-tests:
    name: Signcalc Structural Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/signcalc-service
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout pytest-asyncio
          pip install ezdxf openpyxl httpx fastapi uvicorn pydantic pyyaml

      - name: Smoke test structural imports
        run: |
          python -c "from apex_signcalc.wind_asce7 import wind_force_on_sign; print('wind OK')"
          python -c "from apex_signcalc.foundation_embed import design_embed; print('foundation OK')"
          python -c "from apex_signcalc.anchors_baseplate import design_anchors; print('anchors OK')"

      - name: Structural calculation smoke test
        run: |
          python -c "
          from apex_signcalc.wind_asce7 import wind_force_on_sign
          r = wind_force_on_sign(V_mph=115, sign_width_ft=8, sign_height_ft=4, height_to_top_ft=14, exposure='C')
          assert r['design_force_lbs'] > 0, 'Wind force must be positive'
          print(f'Wind force: {r[\"design_force_lbs\"]:.1f} lbs -- OK')

          from apex_signcalc.foundation_embed import design_embed
          f = design_embed(F_lbf=500, M_inlb=60000)
          assert isinstance(f, tuple) and len(f) == 2, 'design_embed returns (results, details)'
          print('Foundation design -- OK')
          print('All structural smoke tests passed')
          "

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint signx-takeoff
        run: ruff check signx-takeoff/ --output-format=github || true

      - name: Lint signcalc-service
        run: ruff check services/signcalc-service/ --output-format=github || true
